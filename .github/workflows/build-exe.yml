name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend (static export)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --onefile --name "edeka-promo-tool" `
            --add-data "frontend/out;frontend/out" `
            --add-data "backend/app/assets;app/assets" `
            --hidden-import openai `
            --hidden-import PIL `
            --hidden-import PIL._imagingft `
            --hidden-import pydantic `
            --hidden-import pydantic_settings `
            --hidden-import httpx `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.middleware `
            --hidden-import fastapi `
            --collect-all app `
            backend/run.py

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: edeka-promo-tool
          path: dist/edeka-promo-tool.exe
