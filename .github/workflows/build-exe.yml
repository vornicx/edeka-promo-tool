name: Build desktop apps (Windows · macOS · Linux)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: python build_windows.py
            artifact: edeka-promo-tool-windows
            path: dist/edeka-promo-tool-windows.zip
          - os: macos-latest
            script: python3 build_mac.py
            artifact: edeka-promo-tool-mac
            path: dist/edeka-promo-tool-mac.zip
          - os: ubuntu-latest
            script: python3 build_linux.py
            artifact: edeka-promo-tool-linux
            path: dist/edeka-promo-tool-linux.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
